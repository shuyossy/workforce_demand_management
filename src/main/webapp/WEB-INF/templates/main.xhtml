<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<html
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:h="jakarta.faces.html"
  xmlns:p="http://primefaces.org/ui"
  xmlns:f="jakarta.faces.core"
>
  <f:view contentType="text/html" locale="ja">
    <h:head>
      <title>タスク管理サンプル</title>
      <h:outputStylesheet library="css" name="app.css" />
    </h:head>
    <h:body>
      <!--
        PrimeFaces + server state saving では menubar 内の url ナビゲーションも form ancestor を
        要求するため、menubar 全体を topForm で包む。各ページ側 form は content 内（topForm 外）に展開される。
      -->
      <h:form id="topForm">
        <p:menubar>
          <p:menuitem value="タスク一覧" url="#{request.contextPath}/tasks/list.xhtml" />
          <p:menuitem value="新規作成" url="#{request.contextPath}/tasks/new.xhtml" />
        </p:menubar>
      </h:form>

      <!--
        <p:messages> は既定で summary/detail を両方描画する。JSF 標準検証メッセージは summary と detail が
        同一文字列のため同じ文が 2 回表示され、業務/成功メッセージも汎用 summary("エラー"/"登録") + 本文の 2 行になる。
        意味のある本文は常に detail 側にあるため showSummary="false" で summary を抑止し、detail を 1 行だけ表示する。
        これにより全メッセージ経路の「2 重表示」を解消する。
      -->
      <p:messages id="globalMessages" showSummary="false" showDetail="true" closable="true" />

      <div class="content">
        <ui:insert name="content" />
      </div>
    </h:body>
  </f:view>
</html>
