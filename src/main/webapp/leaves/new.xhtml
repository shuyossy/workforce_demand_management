<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<ui:composition
  template="/WEB-INF/templates/main.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:h="jakarta.faces.html"
  xmlns:f="jakarta.faces.core"
  xmlns:p="http://primefaces.org/ui"
>
  <ui:define name="content">
    <h:form id="formNew">
      <p:panel header="休暇申請">
        <p:messages id="formMessages" />

        <div class="form-row">
          <p:outputLabel for="type" value="種別:" />
          <p:selectOneMenu id="type" value="#{leaveFormBean.leaveType}" required="true">
            <f:selectItems
              value="#{leaveFormBean.leaveTypes}"
              var="t"
              itemLabel="#{t}"
              itemValue="#{t}"
            />
          </p:selectOneMenu>
        </div>

        <div class="form-row">
          <p:outputLabel for="start" value="開始日:" />
          <p:datePicker
            id="start"
            value="#{leaveFormBean.startDate}"
            required="true"
            showIcon="true"
          />
        </div>

        <div class="form-row">
          <p:outputLabel for="end" value="終了日:" />
          <p:datePicker id="end" value="#{leaveFormBean.endDate}" required="true" showIcon="true" />
        </div>

        <div class="form-row">
          <p:outputLabel for="reason" value="理由:" />
          <p:inputTextarea
            id="reason"
            value="#{leaveFormBean.reason}"
            rows="3"
            cols="40"
            required="true"
          />
        </div>

        <p:commandButton value="申請" action="#{leaveFormBean.submit}" ajax="false" />
        <p:link outcome="/leaves/list.xhtml" value="キャンセル" />
      </p:panel>
    </h:form>
  </ui:define>
</ui:composition>
