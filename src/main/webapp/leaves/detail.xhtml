<?xml version="1.0" encoding="UTF-8" ?>
<!DOCTYPE html>
<ui:composition
  template="/WEB-INF/templates/main.xhtml"
  xmlns="http://www.w3.org/1999/xhtml"
  xmlns:ui="jakarta.faces.facelets"
  xmlns:h="jakarta.faces.html"
  xmlns:f="jakarta.faces.core"
  xmlns:p="http://primefaces.org/ui"
>
  <ui:define name="content">
    <f:metadata>
      <f:viewParam name="id" value="#{leaveDetailBean.id}" />
      <f:viewAction action="#{leaveDetailBean.load}" />
    </f:metadata>

    <h:form id="detailForm" rendered="#{not empty leaveDetailBean.detail}">
      <p:panel header="休暇申請詳細 (ID: #{leaveDetailBean.detail.id})">
        <p:messages id="detailMessages" />
        <p:panelGrid columns="2" layout="grid" styleClass="ui-noborder">
          <h:outputText value="申請者:" />
          <h:outputText
            value="#{leaveDetailBean.detail.applicantName} (#{leaveDetailBean.detail.applicantEmpNum})"
          />

          <h:outputText value="所属:" />
          <h:outputText value="#{leaveDetailBean.detail.applicantOrgName}" />

          <h:outputText value="種別:" />
          <h:outputText value="#{leaveDetailBean.detail.leaveType}" />

          <h:outputText value="期間:" />
          <h:outputText
            value="#{leaveDetailBean.detail.period.startDate} ～ #{leaveDetailBean.detail.period.endDate}"
          />

          <h:outputText value="理由:" />
          <h:outputText value="#{leaveDetailBean.detail.reason}" />

          <h:outputText value="状態:" />
          <h:outputText
            value="#{leaveDetailBean.detail.status}"
            styleClass="status-#{leaveDetailBean.detail.status.name().toLowerCase()}"
          />

          <h:outputText value="申請日時:" />
          <h:outputText value="#{leaveDetailBean.detail.appliedAt}" />

          <h:outputText
            value="判断者:"
            rendered="#{not empty leaveDetailBean.detail.judgeEmpNum}"
          />
          <h:outputText
            value="#{leaveDetailBean.detail.judgeName} (#{leaveDetailBean.detail.judgeEmpNum})"
            rendered="#{not empty leaveDetailBean.detail.judgeEmpNum}"
          />

          <h:outputText value="判断日時:" rendered="#{not empty leaveDetailBean.detail.judgedAt}" />
          <h:outputText
            value="#{leaveDetailBean.detail.judgedAt}"
            rendered="#{not empty leaveDetailBean.detail.judgedAt}"
          />

          <h:outputText
            value="判断コメント:"
            rendered="#{not empty leaveDetailBean.detail.judgeComment}"
          />
          <h:outputText
            value="#{leaveDetailBean.detail.judgeComment}"
            rendered="#{not empty leaveDetailBean.detail.judgeComment}"
          />
        </p:panelGrid>

        <p:fieldset
          legend="判断"
          rendered="#{leaveDetailBean.detail.canApprove or leaveDetailBean.detail.canReject}"
        >
          <div class="form-row">
            <p:outputLabel for="comment" value="コメント:" />
            <p:inputTextarea
              id="comment"
              value="#{leaveDetailBean.judgeComment}"
              rows="2"
              cols="40"
            />
          </div>
          <p:commandButton
            value="承認"
            action="#{leaveDetailBean.approve}"
            rendered="#{leaveDetailBean.detail.canApprove}"
            ajax="false"
          />
          <p:commandButton
            value="却下"
            action="#{leaveDetailBean.reject}"
            rendered="#{leaveDetailBean.detail.canReject}"
            ajax="false"
          />
        </p:fieldset>

        <p:link outcome="/leaves/list.xhtml" value="一覧へ戻る" />
      </p:panel>
    </h:form>
  </ui:define>
</ui:composition>
