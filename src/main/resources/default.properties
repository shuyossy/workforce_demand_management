# 既定の設定セット（@PropertyId("default") で参照される）。
# ExceptionHelper 用の exceptionhandler.{errorCode}.message / .httpstatus キーをここに定義する。
# 未定義キーアクセスは Config.getMessage() が空文字、Config.getInt() が 0 を返す挙動のため、
# 必要なエラーコードに対する応答メッセージ・HTTP ステータスをこのファイルで段階的に整備する。

# 業務エラー（MSTBusinessException デフォルト ErrorCode）
# message テンプレートは {0} 単体の passthrough。具体的な業務メッセージは
# MSTBusinessException(String...) の引数で渡し、ExceptionFacesResponseHandler が
# httpstatus=400 として現画面に FacesMessage 表示する。
exceptionhandler.invalid-operation.message={0}
exceptionhandler.invalid-operation.httpstatus=400
