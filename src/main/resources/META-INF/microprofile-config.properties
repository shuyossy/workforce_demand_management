# 承認可と見なす職層Sコードのリスト（カンマ区切り）
app.approval.manager-layer-codes=M1,M2

# 認証モード（DEV_LOGIN / HEADER）：将来の HEADER 認証切替用の予約キー。現状は未使用（消費する Java コードは無し）。
app.auth.mode=DEV_LOGIN

# 開発用ダミーユーザリストのパス（classpath からの読み込み）
app.dev-users.path=dev-users.yml

# 外部URL ベース（メール本文等、絶対URL が必要な場合のみ。空のときは X-Forwarded-* から推定）
app.external-base-url=
