# build:jar: Maven で WAR をビルド（packaging=war）。後段の build:image が `target/*.war` を直接利用する。
# build:image: マルチステージ Dockerfile で Maven build → WildFly ランタイムへ deploy し、
#              syft で SBOM（CycloneDX JSON）を生成する。
build:jar:
  stage: package
  image: $IMAGE_MAVEN
  needs: ['test:java', 'test:js']
  cache:
    - <<: *cache_maven
    - <<: *cache_node
  script:
    - ./mvnw $MAVEN_CLI_OPTS -DskipTests package
  artifacts:
    paths:
      - target/*.war
    expire_in: 1 week
    optional: true

build:image:
  stage: package
  image: $IMAGE_DOCKER
  services:
    - name: $IMAGE_DIND
      alias: docker
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    DOCKER_HOST: 'tcp://docker:2376'
    DOCKER_CERT_PATH: '/certs/client'
    DOCKER_TLS_VERIFY: '1'
  needs: ['build:jar']
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker save $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA -o image.tar
    - docker run --rm -v "$PWD:/work" -w /work $IMAGE_SYFT packages docker-archive:image.tar -o cyclonedx-json > sbom.cdx.json
  artifacts:
    paths:
      - image.tar
      - sbom.cdx.json
    expire_in: 1 week
