services:
  postgres:
    image: postgres:16-alpine
    container_name: sak-dev-postgres
    environment:
      POSTGRES_DB: rcb
      POSTGRES_USER: rcb
      POSTGRES_PASSWORD: rcb
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rcb']
      interval: 5s
      timeout: 5s
      retries: 10

